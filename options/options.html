<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>PagePilot 设置</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            line-height: 1.5;
            box-sizing: border-box;
        }
        .container {
            background: var(--card-bg);
            padding: 32px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 600px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }
        .header h1 { 
            font-size: 22px; 
            margin: 0; 
            color: #0f172a; 
            font-weight: 700; 
            letter-spacing: -0.025em;
        }
        .section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin: 24px 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }
        .form-group { margin-bottom: 20px; }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 600; 
            font-size: 13px; 
            color: var(--text-main); 
        }
        .hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
        }
        input[type="text"], input[type="password"], textarea, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            background: #fff;
            transition: all 0.2s;
            color: var(--text-main);
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        textarea { 
            height: 140px; 
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: vertical;
        }
        .btn-group { 
            display: flex; 
            justify-content: flex-end;
            gap: 12px; 
            margin-top: 32px; 
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }
        button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary { 
            background-color: var(--primary-color); 
            color: white; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .btn-primary:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        .btn-secondary { background-color: #f1f5f9; color: #475569; }
        .btn-secondary:hover { background-color: #e2e8f0; }
        
        .status-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            opacity: 0;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        .status-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .status-loading { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
        .status-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        
        .status-pill {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 8px;
        }
        .status-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        
        #test-status {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
            </svg>
            <h1 id="title">PagePilot 设置</h1>
        </div>
        
        <script type="module" src="options.js"></script>

        <div class="section-title" id="section-api-lang">API 与语言设置</div>
        <div class="form-row">
            <div class="form-group">
                <label id="label-lang">界面与分组语言 (Language)</label>
                <select id="language">
                    <option value="zh">简体中文</option>
                    <option value="en">English</option>
                </select>
            </div>

            <div class="form-group">
                <label id="label-apiProvider">API 服务商</label>
                <select id="apiProvider">
                    <!-- Options populated by JS -->
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label id="label-apiKey">API Key</label>
                <div style="display: flex; gap: 8px;">
                    <input type="password" id="apiKey" placeholder="sk-..." style="flex: 1;">
                    <button id="testApiKey" class="btn-secondary" title="测试连接" style="padding: 10px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                        </svg>
                    </button>
                </div>
                <div id="test-status" class="status-pill"></div>
            </div>
        </div>

        <div id="custom-api-fields" style="display: none;">
            <div class="form-row">
                <div class="form-group">
                    <label id="label-customUrl">自定义 API URL</label>
                    <input type="text" id="customUrl" placeholder="https://api.example.com/v1/chat/completions">
                </div>
                <div class="form-group">
                    <label id="label-customModel">自定义模型名称</label>
                    <input type="text" id="customModel" placeholder="gpt-3.5-turbo">
                </div>
            </div>
        </div>

        <div class="section-title" id="section-strategy-prompt">分组策略与 Prompt</div>
        <div class="form-group">
            <label id="label-strategy">分组策略 (Grouping Strategy)</label>
            <div style="display: flex; gap: 8px;">
                <select id="strategy" style="flex: 1;">
                    <!-- Options populated by JS -->
                </select>
                <button id="reset" class="btn-secondary" title="恢复当前策略默认 Prompt" style="padding: 10px; flex-shrink: 0;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="form-group">
            <label id="label-prompt">自定义分组 Prompt (Custom Prompt)</label>
            <span class="hint" id="hint-prompt">自定义 AI 分组逻辑。</span>
            <textarea id="prompt"></textarea>
        </div>

        <div class="form-group" style="display: flex; align-items: center; gap: 8px; margin-top: 24px;">
            <input type="checkbox" id="debugMode" style="width: 16px; height: 16px; margin: 0;">
            <label for="debugMode" id="label-debug" style="margin-bottom: 0; cursor: pointer;">调试模式 (在控制台输出日志)</label>
        </div>

        <div class="btn-group">
            <button id="save" class="btn-primary">保存设置</button>
        </div>
        <div id="status" class="status-toast">
            <div id="status-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <span id="status-text">设置已保存</span>
        </div>
    </div>
    <footer class="github-global-footer" role="contentinfo">
        <a href="https://github.com/Raysance/PagePilot" class="github-link" target="_blank" rel="noopener noreferrer" aria-label="访问 GitHub 仓库">
            <svg viewBox="0 0 24 24" aria-hidden="true" class="github-icon">
                <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.38 7.86 10.9.58.1.79-.25.79-.56 0-.28-.01-1.02-.02-2-3.2.7-3.87-1.54-3.87-1.54-.53-1.34-1.3-1.7-1.3-1.7-1.06-.73.08-.72.08-.72 1.17.08 1.79 1.2 1.79 1.2 1.04 1.78 2.74 1.27 3.41.97.11-.75.41-1.27.75-1.56-2.55-.29-5.23-1.28-5.23-5.69 0-1.26.45-2.29 1.19-3.09-.12-.29-.52-1.46.11-3.04 0 0 .97-.31 3.18 1.18a11.1 11.1 0 0 1 2.9-.39c.99.01 1.98.13 2.9.39 2.2-1.49 3.17-1.18 3.17-1.18.63 1.58.24 2.75.12 3.04.74.8 1.18 1.83 1.18 3.09 0 4.42-2.69 5.39-5.25 5.67.42.36.8 1.09.8 2.2 0 1.59-.02 2.87-.02 3.26 0 .31.21.67.8.56A10.52 10.52 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"/>
            </svg>
        </a>
        <style>
            .github-global-footer { margin-top: 6px; padding: 12px 0 16px; text-align: center; }
            .github-global-footer .github-link { display: inline-flex; align-items: center; justify-content: center; width: 48px; height: 48px; border-radius: 12px; background: #ffffff; box-shadow: 0 2px 6px rgba(0,0,0,.08); text-decoration: none; transition: all .25s ease; }
            .github-global-footer .github-link:hover { transform: translateY(-4px); box-shadow: 0 6px 18px rgba(0,0,0,.15); }
            .github-global-footer .github-icon { width: 28px; height: 28px; fill: #24292f; transition: fill .25s ease; }
            .github-global-footer .github-link:hover .github-icon { fill: #0969da; }
            @media (prefers-color-scheme: dark) { .github-global-footer .github-link { background:#1f2428; box-shadow: 0 2px 6px rgba(0,0,0,.4);} .github-global-footer .github-icon{fill:#e6edf3;} .github-global-footer .github-link:hover .github-icon{fill:#58a6ff;} }
        </style>
    </footer>
</body>
</html>
