<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 240px;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #ffffff;
            margin: 0;
            color: #333;
        }
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }
        .header h2 {
            font-size: 18px;
            margin: 0;
            color: #2c3e50;
        }
        .btn-main {
            width: 100%;
            padding: 12px;
            background-color: #0078d4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0, 120, 212, 0.2);
        }
        .btn-main:hover {
            background-color: #005a9e;
            transform: translateY(-1px);
        }
        .btn-main:active {
            transform: translateY(0);
        }
        .btn-main:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .footer {
            margin-top: 15px;
            text-align: center;
        }
        .footer a {
            color: #666;
            text-decoration: none;
            font-size: 12px;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        #status {
            margin-top: 12px;
            font-size: 13px;
            text-align: center;
            min-height: 18px;
        }
        .error { color: #d13438; }
        .success { color: #107c10; }
        .loading { color: #0078d4; }
    </style>
</head>
<body>
    <div class="header">
        <h2 id="app-name">PagePilot</h2>
    </div>
    <button id="organizeBtn" class="btn-main">智能分组标签页</button>
    <div id="status"></div>
    <div class="footer">
        <a href="#" id="openOptions">设置 (Options)</a>
    </div>
    <script src="popup.js"></script>
</body>
</html>
